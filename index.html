<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaid Khaza'leh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://alakbar-store.com/public/uploads/files/rmSndwxGWCV_zZh.png">
</head>
<body>
    <!-- Background Animation -->
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="profile-wrapper">
                <div class="profile-image-container">
                    <img src="https://alakbar-store.com/public/uploads/files/ATG_0CliDILQoqB.jpeg" alt="Profile Picture" class="profile-image">
                    <div class="profile-glow"></div>
                </div>
                
                <div class="profile-info">
                    <h1 class="profile-name">𝑍𝑎𝑖𝑑 𝐾ℎ𝑎𝑧𝑎'𝑙𝑒ℎ</h1>
                    <p class="profile-quote">لا إله إلا الله، وحده لا شريك له، له الملك وله الحمد، وهو على كل شيء قدير</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="links-container">
                <a href="https://instagram.com/zd6" target="_blank" class="link-button instagram-btn" title="Instagram">
                    <div class="button-content">
                        <i class="fab fa-instagram"></i>
                        <span>Instagram</span>
                    </div>
                    <div class="button-bg"></div>
                </a>

                <a href="https://t.me/JJ1JJ" target="_blank" class="link-button telegram-btn" title="Telegram">
                    <div class="button-content">
                        <i class="fab fa-telegram"></i>
                        <span>Telegram</span>
                    </div>
                    <div class="button-bg"></div>
                </a>

                <a href="https://www.snapchat.com/add/zd6old" target="_blank" class="link-button snapchat-btn" title="Snapchat">
                    <div class="button-content">
                        <i class="fab fa-snapchat"></i>
                        <span>Snapchat</span>
                    </div>
                    <div class="button-bg"></div>
                </a>

                <a href="https://ar.m.wikipedia.org/wiki/جامعة_العلوم_والتكنولوجيا_(الأردن)" target="_blank" class="link-button university-btn" title="JUST">
                    <div class="button-content">
                        <i class="fas fa-university"></i>
                        <span>JUST</span>
                    </div>
                    <div class="button-bg"></div>
                </a>

                <a href="https://live.kwikmotion.com/sbrksaquranradiolive/ksaquranradio/chunks.m3u8" target="_blank" class="link-button quran-btn" title="إذاعة القرآن الكريم">
                    <div class="button-content">
                        <i class="fas fa-microphone"></i>
                        <span>إذاعة القرآن الكريم</span>
                    </div>
                    <div class="button-bg"></div>
                </a>

                <a href="http://n08.radiojar.com/dktga74wdd3vv?rj-ttl=5&rj-tok=AAABk6IjRw8Agk32ONglYT_gqA" target="_blank" class="link-button mosque-btn" title="إذاعة المسجد النبوي">
                    <div class="button-content">
                        <i class="fas fa-mosque"></i>
                        <span>إذاعة المسجد النبوي</span>
                    </div>
                    <div class="button-bg"></div>
                </a>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 جميع الحقوق محفوظة. ZaidKaza'leh.</p>
        </footer>
    </div>

    <script>
        // Mouse Move Effect for Blobs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const blobs = document.querySelectorAll('.blob');
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 20;
                const moveX = (x - 0.5) * speed;
                const moveY = (y - 0.5) * speed;
                blob.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // Add smooth entrance for buttons
        const buttons = document.querySelectorAll('.link-button');
        buttons.forEach((button, index) => {
            button.style.opacity = '0';
            button.style.transform = 'translateY(20px)';
            setTimeout(() => {
                button.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.320, 1)';
                button.style.opacity = '1';
                button.style.transform = 'translateY(0)';
            }, 800 + (index * 100));
        });
    </script>
</body>
</html>
